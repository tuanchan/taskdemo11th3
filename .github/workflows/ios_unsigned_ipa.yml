name: iOS Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Patch pbxproj - disable signing
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Xóa DEVELOPMENT_TEAM
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          # Xóa CODE_SIGN_IDENTITY
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ"
          # Xóa PROVISIONING_PROFILE_SPECIFIER
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBXPROJ"
          echo "=== Patched signing settings ==="
          grep -E "CODE_SIGN|DEVELOPMENT_TEAM|PROVISIONING" "$PBXPROJ" | head -20

      - name: xcodebuild archive (no signing)
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find /tmp/Runner.xcarchive/Products -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/Runner.app
          cd /tmp && zip -r TaskFlow-unsigned.ipa Payload
          mv TaskFlow-unsigned.ipa $GITHUB_WORKSPACE/
          echo "Size: $(du -sh $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-iOS-unsigned
          path: TaskFlow-unsigned.ipa
          retention-days: 30
