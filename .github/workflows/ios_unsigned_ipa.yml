name: iOS Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Disable code signing in project.pbxproj
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Set CODE_SIGNING_ALLOWED = NO for all build configs
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' "$PBXPROJ"
          # Add CODE_SIGNING_ALLOWED = NO nếu chưa có
          sed -i '' '/PRODUCT_NAME = Runner;/a\
          CODE_SIGNING_ALLOWED = NO;
          ' "$PBXPROJ" || true
          echo "pbxproj patched"

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: xcodebuild build (no signing)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find /tmp/DerivedData -name "Runner.app" -not -path "*/intermediates/*" | head -1)
          echo "Found: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/Runner.app
          cd /tmp && zip -r TaskFlow-unsigned.ipa Payload
          mv /tmp/TaskFlow-unsigned.ipa $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa
          echo "Done: $(du -sh $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-iOS-unsigned
          path: TaskFlow-unsigned.ipa
          retention-days: 30
