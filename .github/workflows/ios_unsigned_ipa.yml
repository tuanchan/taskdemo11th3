name: iOS Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS folder
        run: flutter create --platforms=ios .

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Patch pbxproj - disable signing
        run: |
          PBX="ios/Runner.xcodeproj/project.pbxproj"
          perl -i -pe 's/DEVELOPMENT_TEAM = \S+?;/DEVELOPMENT_TEAM = "";/g' "$PBX"
          perl -i -pe 's/CODE_SIGN_IDENTITY = ".*?";/CODE_SIGN_IDENTITY = "";/g' "$PBX"
          perl -i -pe 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBX"
          perl -i -pe 's/PROVISIONING_PROFILE_SPECIFIER = ".*?";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PBX"
          grep -E "DEVELOPMENT_TEAM|CODE_SIGN" "$PBX" | sort -u

      - name: xcodebuild build (no archive, no signing)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath /tmp/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            FLUTTER_BUILD_DIR=build \
            SKIP_INSTALL=NO \
            build

      - name: Package IPA
        run: |
          APP=$(find /tmp/DerivedData -name "Runner.app" \
            -not -path "*/intermediates/*" \
            -not -path "*/ArchiveIntermediates/*" \
            | head -1)
          echo "Found: $APP"
          mkdir -p /tmp/Payload
          cp -r "$APP" /tmp/Payload/Runner.app
          cd /tmp && zip -r TaskFlow-unsigned.ipa Payload
          mv TaskFlow-unsigned.ipa $GITHUB_WORKSPACE/
          du -sh $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-iOS-unsigned
          path: TaskFlow-unsigned.ipa
          retention-days: 30
