name: iOS Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS platform folder
        run: flutter create --platforms=ios .

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - name: Build iOS no-codesign via Flutter
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: Package unsigned IPA from build output
        run: |
          APP_PATH="build/ios/iphoneos/Runner.app"
          echo "Checking: $APP_PATH"
          ls build/ios/iphoneos/ || true
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/Runner.app
          cd /tmp && zip -r TaskFlow-unsigned.ipa Payload
          mv /tmp/TaskFlow-unsigned.ipa $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa
          echo "Done: $(du -sh $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-iOS-unsigned
          path: TaskFlow-unsigned.ipa
          retention-days: 30
