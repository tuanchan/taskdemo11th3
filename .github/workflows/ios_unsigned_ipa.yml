name: iOS Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate iOS platform folder if missing
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      - name: Install CocoaPods
        run: |
          cd ios && pod install --repo-update

      - name: xcodebuild archive (no signing)
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates \
            2>&1 | tail -50

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find /tmp/Runner.xcarchive -name "*.app" | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/Runner.app
          cd /tmp && zip -r TaskFlow-unsigned.ipa Payload
          mv /tmp/TaskFlow-unsigned.ipa $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa
          echo "IPA size: $(du -sh $GITHUB_WORKSPACE/TaskFlow-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-iOS-unsigned
          path: TaskFlow-unsigned.ipa
          retention-days: 30
